name: Update Policy Data

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'scripts/requirements.txt'

      - name: Install Python dependencies
        run: |
          pip install -r scripts/requirements.txt
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -q

      - name: Snapshot policy IDs (pre-fetch)
        run: python3 scripts/send_newsletter.py --snapshot-only

      - name: Fetch policy data from all sources
        run: python3 scripts/fetch_all.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: auto-update policy data [skip ci]"
          git push
