<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PolicyDhara</title>
</head>
<body style="margin:0;padding:0;background-color:#f7f6f3;font-family:-apple-system,'Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f7f6f3;">
    <tr><td align="center" style="padding:32px 16px 16px;">

      <!-- Header -->
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;border-collapse:collapse;">
        <tr><td style="padding:24px 28px;background:#fffef9;border-radius:12px 12px 0 0;border-bottom:2px solid #16a34a;">
          <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
            <tr>
              <td>
                <div style="font-family:Georgia,serif;font-size:22px;font-weight:700;color:#1a1a18;letter-spacing:-0.02em;">PolicyDhara</div>
                <div style="font-size:13px;color:#7a7a78;margin-top:4px;">Indian policy tracking by ImpactMojo</div>
              </td>
              <td align="right" valign="top">
                <a href="https://varnasr.github.io/PolicyDhara" style="text-decoration:none;">
                  <div style="display:inline-block;background:#16a34a;color:#ffffff;font-size:11px;font-weight:600;padding:6px 14px;border-radius:100px;letter-spacing:0.02em;">BROWSE ALL</div>
                </a>
              </td>
            </tr>
          </table>
        </td></tr>
      </table>

    </td></tr>
    <tr><td align="center" style="padding:0 16px;">

      <!-- Body: Buttondown injects RSS content here -->
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;border-collapse:collapse;">
        <tr><td style="padding:8px 0;background:transparent;">
          {{ body }}
        </td></tr>
      </table>

    </td></tr>
    <tr><td align="center" style="padding:16px 16px 32px;">

      <!-- Footer -->
      <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;border-collapse:collapse;">
        <tr><td style="padding:20px 28px;background:#fffef9;border-top:2px solid #16a34a;border-radius:0 0 12px 12px;">
          <table width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
            <tr><td style="font-size:13px;color:#7a7a78;line-height:1.8;">
              <a href="https://varnasr.github.io/PolicyDhara" style="color:#16a34a;text-decoration:none;font-weight:500;">Browse all policies</a> &nbsp;&middot;&nbsp;
              <a href="https://varnasr.github.io/PolicyDhara/digest" style="color:#16a34a;text-decoration:none;font-weight:500;">Today's digest</a> &nbsp;&middot;&nbsp;
              <a href="https://varnasr.github.io/PolicyDhara/alerts" style="color:#16a34a;text-decoration:none;font-weight:500;">Sector alerts</a> &nbsp;&middot;&nbsp;
              <a href="https://varnasr.github.io/PolicyDhara/rss.xml" style="color:#16a34a;text-decoration:none;font-weight:500;">RSS feed</a>
            </td></tr>
            <tr><td style="padding-top:16px;font-size:11px;color:#a0a09e;line-height:1.5;">
              PolicyDhara by <a href="https://impactmojo.in" style="color:#a0a09e;">ImpactMojo</a> &mdash; Tracking 300+ official sources across India.<br>
              <a href="{{ unsubscribe_url }}" style="color:#a0a09e;">Unsubscribe</a>
            </td></tr>
          </table>
        </td></tr>
      </table>

    </td></tr>
  </table>
</body>
</html>
